<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Code:wght@300;400;500;700&display=swap"
        rel="stylesheet">

    <title>{{ .Package }} Dashboard</title>

    <style>
        body {
            font-family: "Google Sans Code", monospace;
            background: #f3f4f7;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #333;
        }

        .container {
            background: #fff;
            padding: 20px 20px;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
            width: 60%;
            max-width: 600px;
        }

        h3 {
            margin-top: 0;
            font-size: 22px;
            font-weight: 600;
            color: #1f1f1f;
            text-align: center;
        }

        .version {
            font-size: 14px;
            margin: 10px 0 25px 0;
            color: #666;
            text-align: center;
        }

        .info-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 11px;
        }

        .info-table td {
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .info-table td:first-child {
            font-weight: 500;
            width: 35%;
            color: #444;
        }

        .footer {
            margin-top: 25px;
            font-size: 10px;
            text-align: center;
            color: #999;
        }
    </style>
</head>

<body>

    <div class="container">
        <h3>{{ .Package }}</h3>

        <div class="version">Version {{ .Version }}</div>

        <table class="info-table">
            <tr>
                <td>Instance name</td>
                <td>{{ .InstanceName }}</td>
            </tr>
            <tr>
                <td>Build time</td>
                <td>{{ .BuildTime }}</td>
            </tr>
            <tr>
                <td>Start time</td>
                <td>{{ .StartTime }}</td>
            </tr>
            <tr>
                <td>Uptime</td>
                <td>{{ .UpTime }}</td>
            </tr>
            <tr>
                <td>Database</td>
                <td>{{ .Database }}</td>
            </tr>
            <tr>
                <td>Cache</td>
                <td>{{ .Cache }}</td>
            </tr>
        </table>

        <div class="footer">
            © 2026 Ekhoes Team<br>
            All rights reserved.
        </div>
    </div>

</body>

</html>
